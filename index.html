<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursedlov | Seu PC no máximo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --accent: #8b5cf6;
            --accent-dark: #6d28d9;
            --text: #ffffff;
            --subtext: #94a3b8;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #1e1b4b 0%, #050505 50%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar estilo pill */
        nav {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; color: var(--accent); }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-top: 100px;
            max-width: 800px;
            padding: 0 20px;
        }

        .logo-placeholder {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--text);
        }

        .badge {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 4rem;
            margin: 20px 0;
            background: linear-gradient(to bottom, #fff 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--subtext);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Botones estilo gaming */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 15px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 15px 35px;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        /* Notificación pequeña inferior */
        .floating-notif {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 250px;
            backdrop-filter: blur(5px);
        }

        .notif-btn {
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#"><i class="fas fa-home"></i> Home</a>
        <a href="#">Downloads</a>
        <a href="#">Team Shop</a>
        <a href="#">Sobre</a>
    </nav>

    <div class="hero">
        <div class="logo-placeholder">
            <i class="fas fa-bolt"></i>
        </div>
        
        <span class="badge">CURSEDLOV TEAM</span>
        
        <h1>Seu PC no <span>máximo</span></h1>
        
        <p>Experimente a verdadeira fluidez com nossas ferramentas exclusivas de otimização. Mais FPS, menos lag, sem complicações.</p>
        
        <div class="btn-group">
            <a href="#" class="btn-primary"><i class="fas fa-download"></i> Baixar agora</a>
            <a href="#" class="btn-secondary">Saber mais →</a>
        </div>
    </div>

    <div class="floating-notif">
        <div style="font-size: 0.9rem; font-weight: bold;">SnyX OS 11 25H2</div>
        <div style="font-size: 0.75rem; color: var(--subtext);">O maior lançamento do ano já está disponível</div>
        <a href="#" class="notif-btn">Ver Lançamento</a>
    </div>

</body>
</html>
