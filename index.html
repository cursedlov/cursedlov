<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #020202;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* RGB Ambiental que cubre toda la pantalla */
        .ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: blur(100px);
            opacity: 0.6;
            animation: fullRotate 15s linear infinite;
        }

        .glow-point {
            position: absolute;
            width: 60vw;
            height: 60vh;
            border-radius: 50%;
            animation: colorFlow 10s infinite alternate;
        }

        /* Puntos de luz en las esquinas para llenar el GUI */
        .p1 { top: -10%; left: -10%; background: #ff00ff; }
        .p2 { bottom: -10%; right: -10%; background: #00ffff; animation-delay: -5s; }
        .p3 { top: 50%; left: 50%; transform: translate(-50%, -50%); background: #aa00ff; width: 80vw; }

        @keyframes colorFlow {
            0% { background: #ff0000; filter: hue-rotate(0deg); }
            100% { background: #0000ff; filter: hue-rotate(360deg); }
        }

        @keyframes fullRotate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1); }
        }

        /* Burbujas */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -100px;
            animation: rise 12s infinite linear;
            z-index: 1;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }

        /* Texto Cursed */
        .main-container {
            display: flex;
            align-items: center;
            gap: 50px;
            z-index: 10;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            color: white;
            text-transform: uppercase;
            letter-spacing: -10px;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.3));
        }

        /* Extraterrestres parpadeando */
        .alien-icon {
            font-size: 5rem;
            color: #fff;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            animation: alienFloat 4s ease-in-out infinite, blink 2s infinite;
        }

        @keyframes alienFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @keyframes blink {
            0%, 90% { opacity: 1; }
            95% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="ambient-canvas">
        <div class="glow-point p1"></div>
        <div class="glow-point p2"></div>
        <div class="glow-point p3"></div>
    </div>

    <!-- Burbujas -->
    <div class="bubble" style="left: 5%; width: 40px; height: 40px;"></div>
    <div class="bubble" style="left: 25%; width: 20px; height: 20px; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 75%; width: 60px; height: 60px; animation-delay: 4s;"></div>

    <div class="main-container">
        <i class="fas fa-user-astronaut alien-icon"></i>
        <h1>Cursed</h1>
        <i class="fas fa-user-astronaut alien-icon" style="animation-delay: 2s;"></i>
    </div>

</body>
</html>
