<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #020202;
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Iluminación ambiental que cambia de color (RGB Smooth) */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            /* El degradado central que cambia de color */
            background: radial-gradient(circle at center, var(--glow-color) 0%, #020202 70%);
            opacity: 0.4;
            filter: blur(80px);
            animation: colorShift 12s linear infinite;
            z-index: 0;
        }

        @keyframes colorShift {
            0% { --glow-color: #ff0000; }
            20% { --glow-color: #ff00ff; }
            40% { --glow-color: #0000ff; }
            60% { --glow-color: #00ffff; }
            80% { --glow-color: #00ff00; }
            100% { --glow-color: #ff0000; }
        }

        /* Soporte para que la variable de color funcione en la animación */
        @property --glow-color {
            syntax: '<color>';
            initial-value: #ff0000;
            inherits: false;
        }

        /* Burbujas flotantes animadas */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -100px;
            animation: rise 15s infinite ease-in;
            z-index: 1;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* Contenedor Cursed */
        .main-container {
            display: flex;
            align-items: center;
            gap: 60px;
            z-index: 10;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            color: white;
            text-transform: uppercase;
            letter-spacing: -8px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
            background: linear-gradient(to bottom, #fff 50%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Marcianitos smooth */
        .alien-icon {
            font-size: 5rem;
            color: white;
            opacity: 0.8;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
            animation: alienMove 4s ease-in-out infinite, alienBlink 2.5s step-end infinite;
        }

        @keyframes alienMove {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }

        @keyframes alienBlink {
            0%, 94% { opacity: 0.8; }
            96% { opacity: 0.1; }
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <!-- Generación de burbujas -->
    <div class="bubble" style="left: 15%; width: 50px; height: 50px; animation-duration: 12s;"></div>
    <div class="bubble" style="left: 45%; width: 30px; height: 30px; animation-duration: 20s; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 80%; width: 70px; height: 70px; animation-duration: 16s; animation-delay: 5s;"></div>

    <div class="main-container">
        <i class="fas fa-ghost alien-icon"></i>
        <h1>Cursed</h1>
        <i class="fas fa-ghost alien-icon" style="animation-delay: 2s;"></i>
    </div>

</body>
</html>
