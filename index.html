
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | CURSEDLOV</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Efecto Glitch */
        .glitch {
            font-size: 4rem;
            font-weight: bold;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75),
                        -0.025em -0.05em 0 rgba(255,0,0,.75),
                        0.025em 0.05em 0 rgba(255,0,0,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(255,0,0,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(255,0,0,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(255,0,0,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(255,0,0,.75); }
        }

        /* Contenedor de proyectos */
        .container {
            border: 1px solid #ff0000;
            padding: 20px;
            background: rgba(255, 0, 0, 0.05);
            max-width: 500px;
            text-align: center;
        }

        .status {
            font-size: 1rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #ff0000;
            padding-bottom: 5px;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ff0000;
            color: #ff0000;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
            cursor: pointer;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="glitch">CURSEDLOV</div>
    
    <div class="container">
        <div class="status">SYSTEM STATUS: ONLINE</div>
        
        <div style="margin-bottom: 15px;">
            <strong>NGShoot</strong><br>
            <small>Proyecto de juego en desarrollo</small>
        </div>

        <a href="#" class="btn">DESCARGAR LAUNCHER</a>
        <a href="#" class="btn">VER SCRIPTS</a>
    </div>

    <div class="footer">
        [CONNECTION_ESTABLISHED] - PROYECTOS 2026
    </div>

</body>
</html>
